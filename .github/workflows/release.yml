name: release

on:
  push:
    tags:
      - "*-v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  REGISTRY: rg.fr-par.scw.cloud/portaki-modules

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse module name and version from tag
        id: parse
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          MODULE_NAME=${TAG%-v*}
          VERSION=${TAG#*-v}
          echo "module=$MODULE_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Parsed tag: module=$MODULE_NAME version=$VERSION"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install portaki CLI
        run: cargo install --git https://github.com/PortakiApp/portaki-sdk-rust --branch main --locked portaki-cli

      - name: Update Portaki SDK lockfile to latest main
        run: |
          cargo update -p portaki-sdk -p portaki-sdk-macros -p portaki-connectors -p portaki-test-utils
          grep -q 'portaki-sdk-macros' Cargo.lock
          echo "portaki-sdk-macros revision:"
          awk '/^name = "portaki-sdk-macros"/{getline; getline; print}' Cargo.lock

      - name: Build module
        working-directory: modules/${{ steps.parse.outputs.module }}
        run: |
          MODULE=${{ steps.parse.outputs.module }}
          rm -rf "target/wasm32-unknown-unknown/release/build/${MODULE}-"*
          portaki build --release

      - name: Verify wasm has no browser wasm-bindgen imports
        working-directory: modules/${{ steps.parse.outputs.module }}
        run: |
          set -euo pipefail
          WASM="target/wasm32-unknown-unknown/release/${{ steps.parse.outputs.module }}.wasm"
          if [ ! -f "$WASM" ]; then
            WASM=$(find target/wasm32-unknown-unknown/release -maxdepth 1 -name '*.wasm' | head -1)
          fi
          if strings "$WASM" | grep -q '__wbindgen'; then
            echo "::error::wasm artifact contains wasm-bindgen imports (Extism cannot load it). Remove uuid/chrono js or wasmbind features."
            strings "$WASM" | grep '__wbindgen' | head -20
            exit 1
          fi

      - name: Verify publish manifest matches git tag
        working-directory: modules/${{ steps.parse.outputs.module }}
        env:
          EXPECTED_MODULE: ${{ steps.parse.outputs.module }}
          EXPECTED_VERSION: ${{ steps.parse.outputs.version }}
        run: |
          set -euo pipefail
          PUBLISH_MANIFEST=target/portaki/publish-manifest.json
          if [ ! -f "$PUBLISH_MANIFEST" ]; then
            echo "::error::missing $PUBLISH_MANIFEST — portaki build must produce it"
            exit 1
          fi
          MANIFEST_ID=$(jq -r '.id' "$PUBLISH_MANIFEST")
          MANIFEST_VERSION=$(jq -r '.version' "$PUBLISH_MANIFEST")
          if [ "$MANIFEST_ID" != "$EXPECTED_MODULE" ]; then
            echo "::error::publish-manifest id=$MANIFEST_ID expected module=$EXPECTED_MODULE"
            exit 1
          fi
          if [ "$MANIFEST_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::publish-manifest version=$MANIFEST_VERSION does not match git tag *-v$EXPECTED_VERSION (OCI would be tagged :$MANIFEST_VERSION). Update portaki-sdk-macros / reinstall portaki CLI from main."
            exit 1
          fi
          echo "OCI reference will be ${EXPECTED_MODULE}:${EXPECTED_VERSION}"

      - name: Lint
        working-directory: modules/${{ steps.parse.outputs.module }}
        run: portaki lint

      - name: Test
        working-directory: modules/${{ steps.parse.outputs.module }}
        run: |
          cargo test --lib
          cargo test --test integration

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY || secrets.SCALEWAY_API_KEY || secrets.SCALEWAY_REGISTRY_TOKEN }}

      - name: Publish OCI artifact (portaki publish)
        id: publish
        working-directory: modules/${{ steps.parse.outputs.module }}
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY || secrets.SCALEWAY_API_KEY || secrets.SCALEWAY_REGISTRY_TOKEN }}
          PORTAKI_PUBLISH_VERSION: ${{ steps.parse.outputs.version }}
        run: portaki publish --registry "$REGISTRY"

      - name: Install oras (fallback)
        if: failure() && steps.publish.outcome == 'failure'
        uses: oras-project/setup-oras@v1

      - name: Publish OCI artifact (oras fallback)
        if: failure() && steps.publish.outcome == 'failure'
        working-directory: modules/${{ steps.parse.outputs.module }}
        env:
          MODULE_VERSION: ${{ steps.parse.outputs.version }}
        run: |
          set -euo pipefail
          WASM="target/wasm32-unknown-unknown/release/${{ steps.parse.outputs.module }}.wasm"
          if [ ! -f "$WASM" ]; then
            WASM=$(find target/wasm32-unknown-unknown/release -maxdepth 1 -name '*.wasm' | head -1)
          fi
          if [ ! -f "$WASM" ]; then
            echo "::error::No wasm artifact found under target/wasm32-unknown-unknown/release"
            exit 1
          fi

          PUBLISH_MANIFEST=target/portaki/publish-manifest.json
          MODULE_ID=$(jq -r .id "$PUBLISH_MANIFEST")
          MANIFEST_VERSION=$(jq -r .version "$PUBLISH_MANIFEST")
          if [ "$MANIFEST_VERSION" != "$MODULE_VERSION" ]; then
            echo "::error::publish-manifest version=$MANIFEST_VERSION does not match tag version=$MODULE_VERSION"
            exit 1
          fi
          REF="${REGISTRY}/${MODULE_ID}:${MODULE_VERSION}"
          echo "Pushing $REF (oras fallback)"

          ORAS_ARGS=(
            "$PUBLISH_MANIFEST:application/vnd.portaki.manifest+json"
            "${WASM}:application/wasm"
          )
          for bundle in i18n/*.json; do
            ORAS_ARGS+=("${bundle}:application/vnd.portaki.i18n+json")
          done

          oras push "$REF" "${ORAS_ARGS[@]}"
          oras discover "$REF" --format json

      - name: Package check (portaki publish dry-run)
        working-directory: modules/${{ steps.parse.outputs.module }}
        run: portaki publish --registry "$REGISTRY" --dry-run
