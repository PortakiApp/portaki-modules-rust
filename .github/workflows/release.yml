name: release

on:
  push:
    tags:
      - "*-v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  REGISTRY: rg.fr-par.scw.cloud/portaki-modules

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse module name and version from tag
        id: parse
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          MODULE_NAME=${TAG%-v*}
          VERSION=${TAG#*-v}
          echo "module=$MODULE_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Parsed tag: module=$MODULE_NAME version=$VERSION"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install portaki CLI
        run: cargo install --git https://github.com/PortakiApp/portaki-sdk-rust --branch main --locked portaki-cli

      - name: Build module
        working-directory: modules/${{ steps.parse.outputs.module }}
        run: portaki build --release

      - name: Lint
        working-directory: modules/${{ steps.parse.outputs.module }}
        run: portaki lint

      - name: Test
        working-directory: modules/${{ steps.parse.outputs.module }}
        run: |
          cargo test --lib
          cargo test --test integration

      - name: Install oras
        uses: oras-project/setup-oras@v1

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          # Scaleway registry: secret key only (not access key). Add one of these repo/org secrets.
          password: ${{ secrets.SCW_SECRET_KEY || secrets.SCALEWAY_API_KEY || secrets.SCALEWAY_REGISTRY_TOKEN }}

      - name: Publish OCI artifact
        working-directory: modules/${{ steps.parse.outputs.module }}
        env:
          MODULE_VERSION: ${{ steps.parse.outputs.version }}
        run: |
          set -euo pipefail
          WASM="target/wasm32-unknown-unknown/release/${{ steps.parse.outputs.module }}.wasm"
          if [ ! -f "$WASM" ]; then
            WASM=$(find target/wasm32-unknown-unknown/release -maxdepth 1 -name '*.wasm' | head -1)
          fi
          if [ ! -f "$WASM" ]; then
            echo "::error::No wasm artifact found under target/wasm32-unknown-unknown/release"
            exit 1
          fi

          MODULE_ID=$(jq -r .id target/portaki/manifest.json)
          REF="${REGISTRY}/${MODULE_ID}:${MODULE_VERSION}"
          echo "Pushing $REF"

          ORAS_ARGS=(
            "target/portaki/manifest.json:application/vnd.portaki.manifest+json"
            "${WASM}:application/wasm"
          )
          for bundle in i18n/*.json; do
            ORAS_ARGS+=("${bundle}:application/vnd.portaki.i18n+json")
          done

          oras push "$REF" "${ORAS_ARGS[@]}"
          oras discover "$REF" --format json

      - name: Package check (portaki publish dry-run)
        working-directory: modules/${{ steps.parse.outputs.module }}
        run: portaki publish --registry "$REGISTRY" --dry-run
