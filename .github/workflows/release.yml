name: release

on:
  push:
    tags:
      - "*-v*"

permissions:
  id-token: write
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout portaki-sdk-rust (private)
        uses: actions/checkout@v4
        with:
          repository: PortakiApp/portaki-sdk-rust
          ref: fix/macro-expand-emissions
          path: vendor/portaki-sdk-rust
          token: ${{ secrets.PORTAKI_CI_PAT || secrets.GITHUB_TOKEN }}

      - name: Patch workspace to use vendored SDK
        run: |
          cat >> Cargo.toml << 'EOF'

          [patch."https://github.com/PortakiApp/portaki-sdk-rust.git"]
          portaki-sdk = { path = "vendor/portaki-sdk-rust/crates/portaki-sdk" }
          portaki-sdk-macros = { path = "vendor/portaki-sdk-rust/crates/portaki-sdk-macros" }
          portaki-connectors = { path = "vendor/portaki-sdk-rust/crates/portaki-connectors" }
          portaki-test-utils = { path = "vendor/portaki-sdk-rust/crates/portaki-test-utils" }
          EOF

      - name: Parse module name and version from tag
        id: parse
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          MODULE_NAME=${TAG%-v*}
          VERSION=${TAG#*-v}
          echo "module=$MODULE_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Parsed tag: module=$MODULE_NAME version=$VERSION"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install portaki CLI
        run: cargo install --path vendor/portaki-sdk-rust/crates/portaki-cli --locked

      - name: Build module
        working-directory: modules/${{ steps.parse.outputs.module }}
        run: portaki build --release

      - name: Lint
        working-directory: modules/${{ steps.parse.outputs.module }}
        run: portaki lint

      - name: Test
        working-directory: modules/${{ steps.parse.outputs.module }}
        run: |
          cargo test --lib
          cargo test --test integration

      - name: Authenticate Scaleway via OIDC
        uses: scaleway/action-auth-oidc@v1
        with:
          project-id: ${{ secrets.SCW_PROJECT_ID }}

      - name: Publish
        working-directory: modules/${{ steps.parse.outputs.module }}
        run: portaki publish --registry rg.fr-par.scw.cloud/portaki-modules
