name: Release please

# Opens / updates the draft release PR (CHANGELOG + per-module version bumps).
# Manual merge → GitHub Release/tags + push to main → existing `ci` publish to GHCR.
#
# release-please-action@v5 loads config via the GitHub API (not the local checkout).
# This workflow regenerates checked-in config from modules/*/ and commits drift
# before the action runs so new modules are picked up without hand-editing.
#
# Requires CI GitHub App secrets (CI_APP_ID / CI_APP_PRIVATE_KEY), same pattern as
# portaki-dashboard / portaki-sdk. Plain GITHUB_TOKEN cannot reliably open PRs and
# will not trigger downstream workflows after release-please commits/tags.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Regenerate release-please config from modules/*
        run: bash scripts/generate-release-please-config.sh

      - name: Commit config drift (new modules)
        id: config-commit
        run: |
          set -euo pipefail
          if git diff --quiet -- release-please-config.json .release-please-manifest.json; then
            echo "changed=false" >>"$GITHUB_OUTPUT"
            echo "No release-please config drift."
            exit 0
          fi
          git config user.name "portaki-ci[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-please-config.json .release-please-manifest.json
          git commit -m "ci: regenerate release-please config" \
            -m "Discovered from modules/*/Cargo.toml + portaki.module.json."
          git push
          echo "changed=true" >>"$GITHUB_OUTPUT"
          echo "Pushed regenerated release-please config; action will read tip via API."

      - uses: googleapis/release-please-action@v5
        continue-on-error: true
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
