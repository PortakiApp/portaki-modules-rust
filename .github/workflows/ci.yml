name: ci

on:
  push:
    branches: [main, "feature/**"]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout portaki-sdk-rust (private)
        uses: actions/checkout@v4
        with:
          repository: PortakiApp/portaki-sdk-rust
          ref: fix/macro-expand-emissions
          path: vendor/portaki-sdk-rust
          token: ${{ secrets.PORTAKI_CI_PAT || secrets.GITHUB_TOKEN }}

      - name: Patch workspace to use vendored SDK
        run: |
          cat >> Cargo.toml << 'EOF'

          [patch."https://github.com/PortakiApp/portaki-sdk-rust.git"]
          portaki-sdk = { path = "vendor/portaki-sdk-rust/crates/portaki-sdk" }
          portaki-sdk-macros = { path = "vendor/portaki-sdk-rust/crates/portaki-sdk-macros" }
          portaki-connectors = { path = "vendor/portaki-sdk-rust/crates/portaki-connectors" }
          portaki-test-utils = { path = "vendor/portaki-sdk-rust/crates/portaki-test-utils" }
          EOF

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --workspace --lib

      - name: Integration tests
        run: cargo test --workspace --test integration

      - name: Doc tests
        run: cargo test --workspace --doc

      - name: Install portaki CLI
        run: cargo install --path vendor/portaki-sdk-rust/crates/portaki-cli --locked

      - name: Lint all modules
        run: |
          for module in modules/*/; do
            echo "=== portaki lint: $module ==="
            (cd "$module" && portaki lint)
          done

      - name: Build all modules (wasm)
        run: |
          for module in modules/*/; do
            echo "=== portaki build: $module ==="
            (cd "$module" && portaki build --release)
          done
