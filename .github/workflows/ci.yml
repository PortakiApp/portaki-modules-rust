name: ci

on:
  push:
    branches: [main, "feature/**"]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io/portakiapp

jobs:
  changes:
    name: detect changed modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
      any: ${{ steps.detect.outputs.any }}
      reason: ${{ steps.detect.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve diff base
        id: base
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >>"$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.before }}" >>"$GITHUB_OUTPUT"
          fi

      - name: Detect changed modules
        id: detect
        run: bash .github/scripts/changed-modules.sh "${{ steps.base.outputs.ref }}"

  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --workspace --lib

      - name: Integration tests
        run: cargo test --workspace --test integration

      - name: Doc tests
        run: cargo test --workspace --doc

  # Matrix: only modules touched by the push/PR (or all if workspace/CI shared).
  module:
    name: module (${{ matrix.module }})
    needs: [changes, quality]
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        module: ${{ fromJson(needs.changes.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: modules/${{ matrix.module }} -> target
          shared-key: module-${{ matrix.module }}

      - name: Cache portaki CLI
        id: cache-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/portaki
          key: portaki-cli-${{ runner.os }}-sdk-main

      - name: Install portaki CLI
        if: steps.cache-cli.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/PortakiApp/portaki-sdk --branch main --locked portaki-cli

      - name: Refresh Portaki SDK lockfile from main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cargo update
          grep -q 'portaki-sdk-macros' Cargo.lock

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # PR / feature branches: build+lint only. main: publish script rebuilds once.
      - name: Build and lint (wasm)
        if: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: |
          set -euo pipefail
          module="${{ matrix.module }}"
          echo "=== portaki build: modules/${module} ==="
          (cd "modules/${module}" && portaki build --release)
          echo "=== portaki lint: modules/${module} ==="
          (cd "modules/${module}" && portaki lint)

      - name: Publish to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/publish-module.sh "${{ matrix.module }}"
